<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Crear cuenta · SocialGo</title>
  <link rel="stylesheet" href="css/global.css">
</head>
<body class="auth-page">
  <main class="auth-card">
    <a class="brand" href="index.html"><span class="brand-mark">S</span><span data-brand-name>SocialGo</span></a>
    <h1>Crear cuenta</h1>
    <p class="notice">El nombre visible puede repetirse, pero el nombre de usuario será único al conectarlo con Supabase.</p>
    <form id="registerForm">
      <label>Nombre completo<input id="fullName" required maxlength="80"></label>
      <label>Nombre de usuario<input id="username" required minlength="3" maxlength="24" pattern="[a-zA-Z0-9_.]+"></label>
      <label>Correo electrónico<input id="email" type="email" required autocomplete="email"></label>
      <label>Tipo de cuenta
        <select id="accountType">
          <option value="personal">Personal</option>
          <option value="creator">Creador</option>
          <option value="business">Negocio</option>
        </select>
      </label>
      <label>Contraseña<input id="password" type="password" required minlength="8" autocomplete="new-password"></label>
      <label class="toggle-row"><span>Acepto los términos de demostración</span><input id="terms" type="checkbox" required></label>
      <button class="primary wide" type="submit">Crear cuenta</button>
    </form>
    <p>¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a></p>
  </main>
  <script type="module">
    import { applyBrand } from "./js/brand.js";
    import { demoRegister } from "./js/auth.js";
    applyBrand();
    document.querySelector("#registerForm").addEventListener("submit", (event) => {
      event.preventDefault();
      demoRegister({
        username: document.querySelector("#username").value,
        email: document.querySelector("#email").value,
        accountType: document.querySelector("#accountType").value
      });
      location.href = "index.html";
    });
  </script>
</body>
</html>

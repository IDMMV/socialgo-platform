<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1" name="viewport"/>
<meta content="#185FA5" name="theme-color"/>
<title>Mensajes · MiZona</title>
<link rel="stylesheet" href="css/mizona-sidebar.css">
<link href="manifest.json" rel="manifest"/>
<link href="css/global.css" rel="stylesheet"/>
<link href="css/mizona-unified.css" rel="stylesheet"/>
<link href="css/mizona-phase2.css" rel="stylesheet"/>
<link href="css/mizona-master-shell.css" rel="stylesheet"/>
<link href="assets/favicon-32.png" rel="icon" type="image/png"/><link href="assets/apple-touch-icon.png" rel="apple-touch-icon"/><link href="css/mizona-logo.css" rel="stylesheet"/><link rel="stylesheet" href="css/mejoras-v2.css">
<link rel="stylesheet" href="css/mizona-sidebar-uniforme.css">
</head>
<body>
<main class="page-shell mz-chat-page">
<header class="mz-legacy-header">
<a class="brand mz-official-brand" href="index.html"><img alt="MiZona.pe" class="mz-brand-horizontal" src="assets/mizona-logo-horizontal.svg"/></a>
<a class="secondary" href="index.html">← Volver</a>
</header>
<section aria-label="Mensajería" class="chat-layout" id="chatLayout">
<aside class="conversations-list">
<div class="conversation-list-head">
<strong>Conversaciones</strong>
<small>Contacta con vecinos y proveedores de forma privada.</small>
<label class="conversation-search">
<i aria-hidden="true" class="ti ti-search"></i>
<input autocomplete="off" id="conversationSearch" placeholder="Buscar conversación" type="search"/>
</label>
</div>
<div id="conversationsItems">
<div class="chat-empty"><div><i class="ti ti-loader-2"></i><span>Cargando conversaciones…</span></div></div>
</div>
</aside>
<section class="chat-panel">
<header class="chat-header" id="chatHeader">
<button aria-label="Volver a conversaciones" class="chat-back" id="chatBack" type="button"><i class="ti ti-arrow-left"></i></button>
<div class="chat-header-profile"><strong>Selecciona una conversación</strong><small>Elige un contacto para comenzar</small></div>
</header>
<div class="messages-list" id="messagesList">
<div class="chat-empty"><div><i class="ti ti-messages"></i><strong>Tu mensajería de MiZona</strong><p>Selecciona una conversación o contacta a un proveedor.</p></div></div>
</div>
<form class="message-form" id="messageForm">
<input autocomplete="off" disabled="" id="messageInput" maxlength="2000" placeholder="Escribe un mensaje"/>
<button class="primary" disabled="" id="sendButton" type="submit">Enviar</button>
</form>
</section>
</section>
</main>
<script type="module">
    import { applyBrand } from "./js/brand.js";
    import { supabase, getCurrentUser } from "./js/supabase.js";

    applyBrand();

    const user = await getCurrentUser();
    if (!user) {
      const next = encodeURIComponent(location.pathname.split("/").pop() + location.search);
      window.location.replace(`login.html?next=${next}`);
      throw new Error("Sesión no disponible");
    }

    const params = new URLSearchParams(location.search);
    const chatLayout = document.querySelector("#chatLayout");
    const conversationsItems = document.querySelector("#conversationsItems");
    const conversationSearch = document.querySelector("#conversationSearch");
    const messagesList = document.querySelector("#messagesList");
    const chatHeader = document.querySelector("#chatHeader");
    const chatBack = document.querySelector("#chatBack");
    const form = document.querySelector("#messageForm");
    const input = document.querySelector("#messageInput");
    const sendButton = document.querySelector("#sendButton");

    let activeConversationId = params.get("c");
    let requestedContact = params.get("contacto") || params.get("contact");
    let realtimeChannel = null;
    let conversations = [];

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;").replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;").replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function isPolicyRecursion(error) {
      return error?.code === "42P17" || /infinite recursion|recursi[oó]n infinita/i.test(error?.message || "");
    }

    function showConversationError(error) {
      if (isPolicyRecursion(error)) {
        conversationsItems.innerHTML = `
          <div class="chat-setup-note">
            <strong>Falta actualizar los permisos del chat.</strong><br>
            Ejecuta en Supabase el archivo <b>sql/fase2_mensajeria_y_diseno.sql</b> y vuelve a cargar esta página.
          </div>`;
        return;
      }
      conversationsItems.innerHTML = `<div class="chat-error">No se pudieron cargar las conversaciones: ${escapeHtml(error?.message || "Error desconocido")}</div>`;
    }

    async function queryConversations() {
      const rpcResult = await supabase.rpc("listar_conversaciones_mizona");
      if (!rpcResult.error) return rpcResult;

      if (rpcResult.error.code !== "PGRST202" && !/function .* does not exist/i.test(rpcResult.error.message || "")) {
        return rpcResult;
      }

      return supabase
        .from("conversaciones_detalle")
        .select("*")
        .order("ultimo_mensaje_en", { ascending: false });
    }

    function renderConversations(filter = "") {
      const term = filter.trim().toLocaleLowerCase("es");
      const visible = conversations.filter(item => {
        const text = `${item.otro_nombre || ""} ${item.otro_username || ""} ${item.ultimo_mensaje || ""}`.toLocaleLowerCase("es");
        return !term || text.includes(term);
      });

      conversationsItems.innerHTML = visible.length
        ? visible.map(item => `
          <article class="conversation-item ${item.conversacion_id === activeConversationId ? "active" : ""}"
                   data-conversation="${escapeHtml(item.conversacion_id)}" tabindex="0" role="button">
            ${item.otro_avatar_url
              ? `<img class="avatar" src="${escapeHtml(item.otro_avatar_url)}" alt="">`
              : `<div class="avatar">${escapeHtml((item.otro_nombre || item.otro_username || "U").charAt(0).toUpperCase())}</div>`}
            <div>
              <strong>${escapeHtml(item.otro_nombre || item.otro_username || "Usuario")}</strong>
              <small>@${escapeHtml(item.otro_username || "usuario")}</small>
              <p>${escapeHtml((item.ultimo_mensaje || "Sin mensajes todavía").slice(0, 90))}</p>
            </div>
          </article>`).join("")
        : `<div class="chat-empty"><div><i class="ti ti-message-circle-off"></i><strong>${term ? "No hay coincidencias" : "Aún no tienes conversaciones"}</strong><p>${term ? "Prueba con otro nombre." : "Busca un vecino o contacta a un proveedor para comenzar."}</p></div></div>`;

      conversationsItems.querySelectorAll("[data-conversation]").forEach(item => {
        const open = () => openConversation(item.dataset.conversation);
        item.addEventListener("click", open);
        item.addEventListener("keydown", event => {
          if (event.key === "Enter" || event.key === " ") { event.preventDefault(); open(); }
        });
      });
    }

    async function loadConversations({ autoOpen = true } = {}) {
      const { data, error } = await queryConversations();
      if (error) {
        showConversationError(error);
        return false;
      }

      conversations = data || [];
      renderConversations(conversationSearch.value);

      if (requestedContact) {
        const contact = requestedContact;
        requestedContact = null;
        await resolveRequestedContact(contact);
        return true;
      }

      if (activeConversationId && autoOpen) {
        await openConversation(activeConversationId, false);
      }
      return true;
    }

    async function resolveRequestedContact(contactText) {
      const contact = String(contactText || "").trim();
      if (!contact) return;

      conversationsItems.innerHTML = `<div class="chat-empty"><div><i class="ti ti-user-search"></i><span>Buscando a ${escapeHtml(contact)}…</span></div></div>`;

      let result = await supabase
        .from("perfiles_publicos")
        .select("id,username,nombre_visible,avatar_url")
        .ilike("username", contact)
        .neq("id", user.id)
        .limit(3);

      if (!result.error && !result.data?.length) {
        result = await supabase
          .from("perfiles_publicos")
          .select("id,username,nombre_visible,avatar_url")
          .ilike("nombre_visible", contact)
          .neq("id", user.id)
          .limit(4);
      }

      if (!result.error && !result.data?.length) {
        result = await supabase
          .from("perfiles_publicos")
          .select("id,username,nombre_visible,avatar_url")
          .ilike("nombre_visible", `%${contact}%`)
          .neq("id", user.id)
          .limit(6);
      }

      if (result.error) {
        showConversationError(result.error);
        return;
      }

      const matches = result.data || [];
      if (!matches.length) {
        conversationsItems.innerHTML = `
          <div class="chat-empty"><div><i class="ti ti-user-off"></i><strong>No se encontró a ${escapeHtml(contact)}</strong><p>Ese nombre puede ser de demostración o el usuario todavía no está registrado.</p><a class="secondary" href="servicios.html">Ver servicios disponibles</a></div></div>`;
        return;
      }

      if (matches.length > 1) {
        conversationsItems.innerHTML = matches.map(profile => `
          <article class="conversation-item" data-start-user="${escapeHtml(profile.id)}">
            ${profile.avatar_url ? `<img class="avatar" src="${escapeHtml(profile.avatar_url)}" alt="">` : `<div class="avatar">${escapeHtml((profile.nombre_visible || "U")[0])}</div>`}
            <div><strong>${escapeHtml(profile.nombre_visible || "Usuario")}</strong><small>@${escapeHtml(profile.username || "usuario")}</small><p>Toca para iniciar una conversación</p></div>
          </article>`).join("");
        conversationsItems.querySelectorAll("[data-start-user]").forEach(item => item.addEventListener("click", () => startConversation(item.dataset.startUser)));
        return;
      }

      await startConversation(matches[0].id);
    }

    async function startConversation(otherUserId) {
      const { data, error } = await supabase.rpc("crear_o_obtener_conversacion", { p_otro_usuario: otherUserId });
      if (error) {
        showConversationError(error);
        return;
      }
      activeConversationId = data;
      history.replaceState(null, "", `mensajes.html?c=${encodeURIComponent(data)}`);
      await loadConversations({ autoOpen: false });
      await openConversation(data, false);
    }

    async function openConversation(id, updateUrl = true) {
      activeConversationId = id;
      if (updateUrl) history.replaceState(null, "", `mensajes.html?c=${encodeURIComponent(id)}`);

      renderConversations(conversationSearch.value);
      chatLayout.classList.add("chat-open");
      input.disabled = false;
      sendButton.disabled = false;

      const current = conversations.find(item => item.conversacion_id === id);
      chatHeader.querySelector(".chat-header-profile").innerHTML = current
        ? `<strong>${escapeHtml(current.otro_nombre || current.otro_username || "Conversación")}</strong><small>@${escapeHtml(current.otro_username || "usuario")}</small>`
        : `<strong>Conversación</strong><small>Mensajes privados</small>`;

      await loadMessages();
      subscribeRealtime();
      input.focus();
    }

    async function loadMessages() {
      messagesList.innerHTML = `<div class="chat-empty"><div><i class="ti ti-loader-2"></i><span>Cargando mensajes…</span></div></div>`;

      const { data, error } = await supabase
        .from("mensajes")
        .select("id,remitente_id,contenido,creado_en,leido,leido_en")
        .eq("conversacion_id", activeConversationId)
        .order("creado_en", { ascending: true })
        .limit(300);

      if (error) {
        messagesList.innerHTML = isPolicyRecursion(error)
          ? `<div class="chat-setup-note"><strong>Los permisos del chat aún no están actualizados.</strong><br>Ejecuta <b>sql/fase2_mensajeria_y_diseno.sql</b> en Supabase.</div>`
          : `<div class="chat-error">${escapeHtml(error.message)}</div>`;
        return;
      }

      messagesList.innerHTML = data?.length
        ? data.map(renderMessage).join("")
        : `<div class="chat-empty"><div><i class="ti ti-message-plus"></i><strong>Inicia la conversación</strong><p>Escribe el primer mensaje.</p></div></div>`;

      await supabase
        .from("mensajes")
        .update({ leido: true, leido_en: new Date().toISOString() })
        .eq("conversacion_id", activeConversationId)
        .neq("remitente_id", user.id)
        .eq("leido", false);

      messagesList.scrollTop = messagesList.scrollHeight;
    }

    function renderMessage(message) {
      const mine = message.remitente_id === user.id;
      return `
        <div class="message-row ${mine ? "mine" : ""}">
          <div class="message-bubble">
            <span>${escapeHtml(message.contenido)}</span>
            <small>${new Date(message.creado_en).toLocaleTimeString("es-PE", { hour: "2-digit", minute: "2-digit" })}${mine ? `<span class="message-status">${message.leido ? "✓✓" : "✓"}</span>` : ""}</small>
          </div>
        </div>`;
    }

    function subscribeRealtime() {
      if (realtimeChannel) supabase.removeChannel(realtimeChannel);
      realtimeChannel = supabase
        .channel(`mizona-conversation-${activeConversationId}`)
        .on("postgres_changes", {
          event: "INSERT",
          schema: "public",
          table: "mensajes",
          filter: `conversacion_id=eq.${activeConversationId}`
        }, async payload => {
          if (messagesList.querySelector(".chat-empty")) messagesList.innerHTML = "";
          messagesList.insertAdjacentHTML("beforeend", renderMessage(payload.new));
          messagesList.scrollTop = messagesList.scrollHeight;
          if (payload.new.remitente_id !== user.id) {
            await supabase.from("mensajes").update({ leido: true, leido_en: new Date().toISOString() }).eq("id", payload.new.id);
          }
          loadConversations({ autoOpen: false });
        })
        .subscribe();
    }

    form.addEventListener("submit", async event => {
      event.preventDefault();
      const content = input.value.trim();
      if (!content || !activeConversationId) return;

      sendButton.disabled = true;
      const { error } = await supabase.from("mensajes").insert({
        conversacion_id: activeConversationId,
        remitente_id: user.id,
        contenido: content
      });

      if (error) {
        const detail = error.details || error.hint || error.message;
        messagesList.insertAdjacentHTML("beforeend", `<div class="chat-error">No se pudo enviar: ${escapeHtml(detail)}</div>`);
      } else {
        input.value = "";
        await loadMessages();
        await loadConversations({ autoOpen: false });
      }

      sendButton.disabled = false;
      input.focus();
    });

    conversationSearch.addEventListener("input", () => renderConversations(conversationSearch.value));
    chatBack.addEventListener("click", () => chatLayout.classList.remove("chat-open"));
    addEventListener("beforeunload", () => { if (realtimeChannel) supabase.removeChannel(realtimeChannel); });

    await loadConversations();
  </script>
<script src="./js/mizona-core.js" type="module"></script>
<script src="./js/mizona-master-shell.js" type="module"></script>
<script type="module" src="./js/tema-mizona.js"></script>
<script type="module" src="js/mizona-sidebar-uniforme.js"></script>
</body>
</html>

<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Confirmando cuenta · SocialGo</title>
  <link rel="stylesheet" href="css/global.css">
</head>
<body class="auth-page">
  <main class="auth-card">
    <a class="brand" href="index.html">
      <span class="brand-mark">S</span>
      <span data-brand-name>SocialGo</span>
    </a>

    <h1 id="title">Confirmando tu cuenta</h1>
    <p id="status" class="notice">Espera un momento…</p>

    <div id="actions" class="modal-actions" hidden>
      <a class="primary" href="login.html">Iniciar sesión</a>
      <a class="secondary" href="index.html">Ir al inicio</a>
    </div>
  </main>

  <script type="module">
    import { applyBrand } from "./js/brand.js";
    import { supabase } from "./js/supabase.js";

    applyBrand();

    const title = document.querySelector("#title");
    const status = document.querySelector("#status");
    const actions = document.querySelector("#actions");

    function finish(message, destination = "login.html", delay = 1800) {
      title.textContent = "Cuenta confirmada";
      status.textContent = message;
      actions.hidden = false;

      window.setTimeout(() => {
        window.location.replace(destination);
      }, delay);
    }

    function fail(message) {
      title.textContent = "No se pudo completar";
      status.textContent = message;
      status.style.borderColor = "var(--danger)";
      actions.hidden = false;
    }

    async function processCallback() {
      const url = new URL(window.location.href);
      const code = url.searchParams.get("code");
      const errorDescription =
        url.searchParams.get("error_description") ||
        url.searchParams.get("error");

      if (errorDescription) {
        fail(decodeURIComponent(errorDescription));
        return;
      }

      try {
        // En flujo PKCE, Supabase devuelve un código que debe intercambiarse.
        if (code) {
          const { error } = await supabase.auth.exchangeCodeForSession(code);

          if (error) {
            // Si el enlace ya confirmó el correo pero se abrió en otro navegador,
            // el intercambio puede no crear sesión. En ese caso se permite iniciar sesión.
            console.warn("No se creó sesión automática:", error.message);
            finish("Tu correo fue confirmado. Ya puedes iniciar sesión.");
            return;
          }

          finish("Tu correo fue confirmado y tu sesión está lista.", "perfil.html");
          return;
        }

        // Algunos enlaces confirman la cuenta antes de redirigir y no entregan código.
        const { data } = await Promise.race([
          supabase.auth.getSession(),
          new Promise((resolve) =>
            window.setTimeout(() => resolve({ data: { session: null } }), 4000)
          )
        ]);

        if (data?.session) {
          finish("Tu cuenta está confirmada y ya has iniciado sesión.", "perfil.html");
        } else {
          finish("Tu correo fue confirmado. Ya puedes iniciar sesión.");
        }
      } catch (error) {
        console.error(error);
        finish("Tu correo fue procesado. Ingresa con tu correo y contraseña.");
      }
    }

    // Límite final para impedir que la pantalla quede cargando indefinidamente.
    const fallback = window.setTimeout(() => {
      finish("Tu correo fue procesado. Ya puedes iniciar sesión.", "login.html", 1200);
    }, 7000);

    processCallback().finally(() => window.clearTimeout(fallback));
  </script>
</body>
</html>

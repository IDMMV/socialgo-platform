<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css"><title>Verificar teléfono · MiZona</title>
<link rel="stylesheet" href="css/global.css"><link rel="stylesheet" href="css/mizona-master-shell.css"><link rel="stylesheet" href="css/mizona-sidebar-uniforme.css"><link rel="stylesheet" href="css/mizona-stability.css"><link rel="stylesheet" href="css/integral-modules.css"><style>
.mz-phone-peru{display:flex;align-items:stretch;border:2px solid #1f2937;border-radius:16px;overflow:hidden;background:#fff;min-height:58px}
.mz-phone-prefix{display:flex;align-items:center;justify-content:center;padding:0 16px;background:#eef4fb;border-right:1px solid #cbd5e1;color:#0f3f78;font-weight:900;font-size:18px;white-space:nowrap}
.mz-phone-peru input{border:0!important;border-radius:0!important;box-shadow:none!important;min-width:0;font-size:19px;letter-spacing:.04em;padding:0 16px!important;background:#fff!important;color:#111827!important}
.mz-phone-peru input:focus{outline:3px solid rgba(24,95,165,.18)!important;outline-offset:-3px}
.mz-phone-help{display:flex;align-items:center;gap:8px;margin-top:8px;color:#64748b;font-size:13px}
.mz-phone-progress{margin-top:12px;color:#64748b;font-size:13px;min-height:20px}
@media(max-width:560px){.mz-phone-prefix{padding:0 13px}.mz-phone-peru input{font-size:18px;padding:0 12px!important}}
</style></head>
<body class="auth-pending"><main class="page-shell"><div class="mz-integral-page"><header class="mz-integral-head"><div><h1>Verificar celular</h1><p>Necesario para alertas, chat privado y solicitudes de proveedor.</p></div></header>
<section class="mz-panel" style="max-width:620px"><div id="phoneStatus" class="mz-alert-box">Cargando tu cuenta…</div><form id="phoneForm" style="margin-top:16px" novalidate><div class="mz-field"><label for="phone">Número de celular peruano</label><div class="mz-phone-peru"><span class="mz-phone-prefix" aria-hidden="true">+51</span><input id="phone" type="tel" inputmode="numeric" autocomplete="tel-national" placeholder="999 999 999" minlength="9" maxlength="9" pattern="9[0-9]{8}" aria-describedby="phoneHelp" required></div><small id="phoneHelp" class="mz-phone-help"><i class="ti ti-info-circle"></i> Ingresa únicamente los 9 dígitos. MiZona agrega automáticamente +51.</small></div><div class="mz-actions"><button class="mz-btn primary" id="sendCode" type="submit">Enviar código</button></div><div id="phoneProgress" class="mz-phone-progress" aria-live="polite"></div></form>
<form id="codeForm" hidden style="margin-top:20px" novalidate><div class="mz-field"><label for="code">Código recibido por SMS</label><input class="mz-phone-code" id="code" inputmode="numeric" autocomplete="one-time-code" maxlength="6" pattern="[0-9]{6}" placeholder="000000" required><small>El código tiene 6 dígitos y vence por seguridad.</small></div><div class="mz-actions"><button class="mz-btn success" type="submit">Verificar ahora</button><button class="mz-btn secondary" id="resend" type="button">Reenviar código</button><button class="mz-btn secondary" id="changePhone" type="button">Cambiar número</button></div></form></section></div></main>
<script type="module" src="js/phone-verification.js?v=5.1"></script><script type="module" src="js/mizona-core.js"></script><script type="module" src="js/mizona-master-shell.js"></script><script type="module" src="js/mizona-sidebar-uniforme.js"></script></body></html>

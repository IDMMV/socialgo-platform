<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Nueva contraseña</title><link rel="stylesheet" href="css/global.css"><link rel="stylesheet" href="css/mizona-unified.css">
<link rel="stylesheet" href="css/mizona-phase2.css">
</head><body class="auth-page"><main class="auth-card"><h1>Nueva contraseña</h1><div id="msg" class="notice" hidden></div><form id="form"><label>Nueva contraseña<input id="password" type="password" minlength="8" required></label><label>Repetir contraseña<input id="password2" type="password" minlength="8" required></label><button class="primary wide">Guardar</button></form></main><script type="module">import{updatePassword}from'./js/auth.js';form.onsubmit=async e=>{e.preventDefault();if(password.value!==password2.value){msg.hidden=false;msg.textContent='Las contraseñas no coinciden.';return}try{await updatePassword(password.value);msg.hidden=false;msg.textContent='Contraseña actualizada.';setTimeout(()=>location.href='index.html',900)}catch(x){msg.hidden=false;msg.textContent=x.message}};</script><script type="module" src="./js/mizona-core.js"></script>
</body></html>

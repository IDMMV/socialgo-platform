<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Iniciar sesión · MiZona.pe</title>
<link rel="manifest" href="manifest.json"/>
<link rel="icon" type="image/png" href="assets/favicon-32.png"/>
<link rel="apple-touch-icon" href="assets/apple-touch-icon.png"/>
<link rel="stylesheet" href="css/global.css"/>
<link rel="stylesheet" href="css/mizona-unified.css"/>
<link rel="stylesheet" href="css/mizona-phase2.css"/>
<link rel="stylesheet" href="css/auth-security.css"/>
<link rel="stylesheet" href="css/mizona-logo.css"/>
<style>
  :root{
    --mz-blue:#185FA5;
    --mz-green:#1D9E75;
    --mz-text:#172033;
    --mz-muted:#64748b;
    --mz-border:#d8e1ec;
    --mz-bg:#eef4f8;
  }
  *{box-sizing:border-box}
  body.auth-page{
    min-height:100vh;
    margin:0;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px 14px;
    background:linear-gradient(135deg,#eef4f8,#f8fafc);
    font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    color:var(--mz-text);
    overflow:auto;
  }
  .auth-card{
    width:min(100%,520px);
    background:#fff;
    border:1px solid #e2e8f0;
    border-radius:22px;
    padding:34px 32px 30px;
    box-shadow:0 20px 70px rgba(15,23,42,.10);
  }
  .brand{
    display:flex;
    align-items:center;
    justify-content:center;
    margin-bottom:28px;
    text-decoration:none;
  }
  .brand img{max-width:230px;height:auto;display:block}
  .brand-fallback{font-size:28px;font-weight:900;color:var(--mz-blue);letter-spacing:.2px}
  .brand-fallback span{color:var(--mz-green)}
  h1{
    margin:0 0 24px;
    text-align:center;
    font-size:32px;
    line-height:1.15;
    font-weight:900;
    color:#172033;
  }
  label{
    display:block;
    color:#526176;
    font-weight:600;
    font-size:15px;
    margin:0 0 16px;
  }
  input{
    width:100%;
    min-height:58px;
    border:1px solid var(--mz-border);
    border-radius:12px;
    padding:0 16px;
    margin-top:8px;
    font-size:16px;
    background:#f8fbff;
    color:#0f172a;
    outline:none;
    transition:.15s ease;
  }
  input:focus{
    border-color:var(--mz-blue);
    box-shadow:0 0 0 4px rgba(24,95,165,.13);
    background:#fff;
  }
  .password-wrap{position:relative;margin-top:8px}
  .password-wrap input{padding-right:56px;margin-top:0}
  .password-eye{
    position:absolute;
    right:10px;
    top:50%;
    transform:translateY(-50%);
    width:42px;
    height:42px;
    border:0;
    background:transparent;
    color:#64748b;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    border-radius:10px;
  }
  .password-eye:hover{background:#edf4fb;color:var(--mz-blue)}
  .password-eye svg{width:22px;height:22px;stroke:currentColor}
  .primary{
    width:100%;
    min-height:58px;
    border:0;
    border-radius:12px;
    background:linear-gradient(135deg,var(--mz-blue),#2076c2);
    color:#fff;
    font-size:17px;
    font-weight:900;
    cursor:pointer;
    box-shadow:0 14px 30px rgba(24,95,165,.22);
    margin-top:10px;
  }
  .primary:disabled{opacity:.7;cursor:not-allowed}

  .google-btn{
    width:100%;min-height:56px;border:1px solid #cbd5e1;border-radius:12px;
    background:#fff;color:#172033;font-size:16px;font-weight:800;cursor:pointer;
    display:flex;align-items:center;justify-content:center;gap:12px;transition:.15s ease;
    box-shadow:0 4px 14px rgba(15,23,42,.05);
  }
  .google-btn:hover{background:#f8fafc;border-color:#94a3b8;box-shadow:0 8px 20px rgba(15,23,42,.08)}
  .google-btn:disabled{opacity:.65;cursor:not-allowed}
  .google-btn svg{width:22px;height:22px;flex:0 0 22px}
  .auth-divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:#94a3b8;font-size:13px;font-weight:700}
  .auth-divider::before,.auth-divider::after{content:"";height:1px;background:#e2e8f0;flex:1}
  .auth-links{
    text-align:center;
    margin-top:18px;
    color:#64748b;
    font-size:15px;
  }
  .auth-links p{margin:12px 0 0}
  .auth-links a{color:#185FA5;text-decoration:none;font-weight:800}
  .auth-links a:hover{text-decoration:underline}
  .notice{
    margin:0 0 18px;
    padding:12px 14px;
    border-radius:12px;
    border:1px solid #bfdbfe;
    background:#eff6ff;
    color:#1e40af;
    font-size:14px;
    line-height:1.45;
  }
  .notice.error{border-color:#fecaca;background:#fef2f2;color:#991b1b}
  .notice.success{border-color:#bbf7d0;background:#f0fdf4;color:#166534}
  .back-home{
    display:inline-flex;
    align-items:center;
    gap:6px;
    color:#64748b;
    font-weight:800;
    text-decoration:none;
    font-size:13px;
    margin-bottom:16px;
  }
  .back-home:hover{color:#185FA5}
  @media(max-width:560px){
    body.auth-page{align-items:flex-start;padding:16px 12px 28px}
    .auth-card{border-radius:18px;padding:24px 18px 24px}
    h1{font-size:28px}
    .brand img{max-width:190px}
  }
</style>
<link rel="stylesheet" href="css/mizona-stability.css">
</head>
<body class="auth-page">
<main class="auth-card">
  <a class="back-home" href="index.html">← Volver al inicio</a>
  <a class="brand mz-official-brand" href="index.html" aria-label="MiZona.pe">
    <img alt="MiZona.pe" class="mz-brand-horizontal" src="assets/mizona-logo-horizontal.svg" onerror="this.style.display='none';document.getElementById('brandFallback').style.display='block'"/>
    <span id="brandFallback" class="brand-fallback" style="display:none">Mi<span>Zona</span>.pe</span>
  </a>

  <h1>Iniciar sesión</h1>
  <div class="notice" hidden id="msg"></div>


  <button class="google-btn" id="btnGoogle" type="button" aria-label="Continuar con Google">
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <path fill="#4285F4" d="M21.35 12.23c0-.71-.06-1.4-.18-2.06H12v3.9h5.24a4.48 4.48 0 0 1-1.94 2.94v2.53h3.14c1.84-1.69 2.91-4.19 2.91-7.31Z"/>
      <path fill="#34A853" d="M12 21.75c2.62 0 4.82-.87 6.43-2.36l-3.14-2.53c-.87.58-1.98.92-3.29.92-2.53 0-4.67-1.71-5.44-4.01H3.32v2.61A9.72 9.72 0 0 0 12 21.75Z"/>
      <path fill="#FBBC05" d="M6.56 13.77A5.85 5.85 0 0 1 6.25 12c0-.61.11-1.21.31-1.77V7.62H3.32A9.73 9.73 0 0 0 2.25 12c0 1.57.38 3.05 1.07 4.38l3.24-2.61Z"/>
      <path fill="#EA4335" d="M12 6.22c1.43 0 2.71.49 3.72 1.45l2.79-2.79C16.82 3.31 14.62 2.25 12 2.25a9.72 9.72 0 0 0-8.68 5.37l3.24 2.61c.77-2.3 2.91-4.01 5.44-4.01Z"/>
    </svg>
    <span>Continuar con Google</span>
  </button>
  <div class="auth-divider"><span>o usa tu correo</span></div>

  <form id="loginForm" autocomplete="on">
    <label for="email">Correo
      <input autocomplete="email" id="email" name="email" required type="email"/>
    </label>

    <label for="password">Contraseña
      <span class="password-wrap">
        <input autocomplete="current-password" id="password" name="password" minlength="6" required type="password"/>
        <button class="password-eye" id="btnEye" type="button" aria-label="Mostrar contraseña" title="Mostrar contraseña">
          <svg id="eyeOpen" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12Z"></path>
            <circle cx="12" cy="12" r="3"></circle>
          </svg>
          <svg id="eyeClosed" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
            <path d="M3 3l18 18"></path>
            <path d="M10.6 10.6A3 3 0 0 0 13.4 13.4"></path>
            <path d="M9.9 4.2A10.4 10.4 0 0 1 12 4c6.5 0 10 8 10 8a18.4 18.4 0 0 1-4.1 5.1"></path>
            <path d="M6.1 6.1C3.5 7.9 2 12 2 12s3.5 8 10 8a10.8 10.8 0 0 0 5.9-1.9"></path>
          </svg>
        </button>
      </span>
    </label>

    <button class="primary" id="btnLogin" type="submit">Ingresar</button>
  </form>

  <div class="auth-links">
    <p><a href="recuperar.html">¿Olvidaste tu contraseña?</a></p>
    <p>¿No tienes cuenta? <a href="registro.html">Regístrate</a></p>
  </div>
</main>

<script type="module">
import { supabase as sb } from './js/supabase.js';
import { signInWithGoogle } from './js/auth.js';

const form = document.getElementById('loginForm');
const email = document.getElementById('email');
const password = document.getElementById('password');
const btnLogin = document.getElementById('btnLogin');
const btnGoogle = document.getElementById('btnGoogle');
const msg = document.getElementById('msg');
const btnEye = document.getElementById('btnEye');
const eyeOpen = document.getElementById('eyeOpen');
const eyeClosed = document.getElementById('eyeClosed');

function showMessage(text, type){
  msg.hidden = false;
  msg.className = 'notice ' + (type || '');
  msg.textContent = text;
}

function safeNext(){
  const params = new URLSearchParams(location.search);
  const next = params.get('next');
  if(next && !next.includes('://') && !next.startsWith('//')) return next;
  return 'index.html';
}

btnGoogle.addEventListener('click', async function(){
  msg.hidden = true;
  btnGoogle.disabled = true;
  const label = btnGoogle.querySelector('span');
  const oldText = label.textContent;
  label.textContent = 'Abriendo Google...';
  try{
    await signInWithGoogle(safeNext());
  }catch(err){
    showMessage(err?.message || 'No se pudo iniciar con Google. Revisa la configuración e inténtalo nuevamente.', 'error');
    btnGoogle.disabled = false;
    label.textContent = oldText;
  }
});

btnEye.addEventListener('click', function(){
  const visible = password.type === 'text';
  password.type = visible ? 'password' : 'text';
  btnEye.setAttribute('aria-label', visible ? 'Mostrar contraseña' : 'Ocultar contraseña');
  btnEye.setAttribute('title', visible ? 'Mostrar contraseña' : 'Ocultar contraseña');
  eyeOpen.style.display = visible ? 'block' : 'none';
  eyeClosed.style.display = visible ? 'none' : 'block';
  password.focus();
});

form.addEventListener('submit', async function(e){
  e.preventDefault();
  msg.hidden = true;
  btnLogin.disabled = true;
  btnLogin.textContent = 'Ingresando...';

  try{
    const { data, error } = await sb.auth.signInWithPassword({
      email: email.value.trim(),
      password: password.value
    });
    if(error) throw error;
    if(!data || !data.user) throw new Error('No se pudo iniciar sesión. Inténtalo nuevamente.');

    showMessage('Ingreso correcto. Redirigiendo...', 'success');
    setTimeout(function(){ location.href = safeNext(); }, 450);
  }catch(err){
    const txt = String(err && err.message ? err.message : err);
    let friendly = txt;
    if(/invalid login credentials/i.test(txt)) friendly = 'Correo o contraseña incorrectos. Verifica los datos e intenta nuevamente.';
    if(/email not confirmed/i.test(txt)) friendly = 'Tu correo todavía no está confirmado. Revisa tu bandeja de entrada.';
    showMessage(friendly, 'error');
    btnLogin.disabled = false;
    btnLogin.textContent = 'Ingresar';
  }
});
</script>
</body>
</html>

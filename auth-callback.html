</head><body class="auth-page"><main class="auth-card"><h1>Confirmando tu cuenta</h1><p id="status" class="notice">Espera un momento…</p></main><script type="module">import{supabase}from'./js/supabase.js';const{data,error}=await supabase.auth.getSession();status.textContent=error?error.message:(data.session?'Cuenta confirmada. Entrando…':'Correo confirmado. Ya puedes iniciar sesión.');setTimeout(()=>location.href=data.session?'perfil.html':'login.html',1200);</script><script type="module" src="./js/mizona-core.js"></script>

<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Amigos · MiZona</title><link rel="stylesheet" href="css/global.css"><link rel="stylesheet" href="css/mizona-unified.css">
<link rel="stylesheet" href="css/mizona-phase2.css">
<link rel="stylesheet" href="css/mizona-master-shell.css">
</head><body>
<main class="page-shell"><header style="display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:18px"><a class="brand" href="index.html"><span class="brand-mark">MZ</span><span data-brand-name>MiZona</span></a><a class="secondary" href="index.html">← Volver</a></header>
<section class="page-card"><h1>Amigos</h1><div class="friend-tabs"><button class="active" data-tab="friends">Mis amigos</button><button data-tab="received">Solicitudes recibidas</button><button data-tab="sent">Solicitudes enviadas</button></div><div id="friendsContent" class="people-grid"><p class="notice">Cargando…</p></div></section></main>
<script type="module">
import { applyBrand } from "./js/brand.js"; import { supabase,getCurrentUser } from "./js/supabase.js"; applyBrand();
const user=await getCurrentUser(); if(!user) location.replace("login.html?next=amistades.html"); const content=document.querySelector("#friendsContent");
const esc=v=>String(v??"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;");
const initials=v=>String(v||"U").split(/\s+/).slice(0,2).map(x=>x[0]).join("").toUpperCase();
function online(v){if(!v)return"Sin actividad reciente";const d=Date.now()-new Date(v).getTime();if(d<300000)return'<span class="online-dot"></span> En línea';const m=Math.floor(d/60000);if(m<60)return`Activo hace ${m} min`;const h=Math.floor(m/60);if(h<24)return`Activo hace ${h} h`;return`Activo hace ${Math.floor(h/24)} d`}
function card(p,a=""){return`<article class="friend-request-card">${p.avatar_url?`<img class="avatar" src="${esc(p.avatar_url)}" alt="">`:`<div class="avatar">${esc(initials(p.nombre_visible))}</div>`}<div><strong>${esc(p.nombre_visible||"Usuario")}</strong><small>@${esc(p.username)}</small><div class="last-seen">${online(p.ultima_actividad)}</div></div><div class="friend-request-actions"><a class="secondary" href="usuario.html?u=${encodeURIComponent(p.username)}">Ver perfil</a>${a}</div></article>`}
async function friends(){content.innerHTML='<p class="notice">Cargando amigos…</p>';const {data,error}=await supabase.from("amigos_detalle").select("*").order("nombre_visible");if(error){content.innerHTML=`<p class="notice">${esc(error.message)}</p>`;return}content.innerHTML=data?.length?data.map(p=>card(p,`<button class="secondary" data-message="${p.id}">Mensaje</button><button class="secondary" data-remove="${p.solicitud_id}">Eliminar amistad</button>`)).join(""):'<p class="notice">Todavía no tienes amigos.</p>';document.querySelectorAll('[data-message]').forEach(b=>b.onclick=async()=>{const {data,error}=await supabase.rpc("crear_o_obtener_conversacion",{p_otro_usuario:b.dataset.message});if(error)alert(error.message);else location.href=`mensajes.html?c=${data}`});document.querySelectorAll('[data-remove]').forEach(b=>b.onclick=async()=>{if(!confirm("¿Eliminar esta amistad?"))return;const {error}=await supabase.from("solicitudes_amistad").delete().eq("id",b.dataset.remove);if(error)alert(error.message);else friends()})}
async function received(){content.innerHTML='<p class="notice">Cargando solicitudes…</p>';const {data,error}=await supabase.from("solicitudes_recibidas_detalle").select("*").order("creado_en",{ascending:false});if(error){content.innerHTML=`<p class="notice">${esc(error.message)}</p>`;return}content.innerHTML=data?.length?data.map(p=>card(p,`<button class="primary" data-accept="${p.solicitud_id}">Aceptar</button><button class="secondary" data-reject="${p.solicitud_id}">Rechazar</button>`)).join(""):'<p class="notice">No tienes solicitudes pendientes.</p>';document.querySelectorAll('[data-accept]').forEach(b=>b.onclick=()=>respond(b.dataset.accept,"aceptada"));document.querySelectorAll('[data-reject]').forEach(b=>b.onclick=()=>respond(b.dataset.reject,"rechazada"))}
async function respond(id,r){const {error}=await supabase.rpc("responder_solicitud_amistad",{p_solicitud_id:id,p_respuesta:r});if(error)alert(error.message);else received()}
async function sent(){content.innerHTML='<p class="notice">Cargando solicitudes…</p>';const {data,error}=await supabase.from("solicitudes_enviadas_detalle").select("*").order("creado_en",{ascending:false});if(error){content.innerHTML=`<p class="notice">${esc(error.message)}</p>`;return}content.innerHTML=data?.length?data.map(p=>card(p,`<span class="status-badge">${esc(p.estado)}</span>${p.estado==="pendiente"?`<button class="secondary" data-cancel="${p.solicitud_id}">Cancelar</button>`:""}`)).join(""):'<p class="notice">No tienes solicitudes enviadas.</p>';document.querySelectorAll('[data-cancel]').forEach(b=>b.onclick=async()=>{const {error}=await supabase.from("solicitudes_amistad").delete().eq("id",b.dataset.cancel).eq("solicitante_id",user.id);if(error)alert(error.message);else sent()})}
document.querySelectorAll('[data-tab]').forEach(b=>b.onclick=()=>{document.querySelectorAll('[data-tab]').forEach(x=>x.classList.remove("active"));b.classList.add("active");({friends,received,sent})[b.dataset.tab]()}); await friends();
</script><script type="module" src="./js/mizona-core.js"></script>
<script type="module" src="./js/mizona-master-shell.js"></script>
</body></html>

<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css"><title>Verificar teléfono · MiZona</title>
<link rel="stylesheet" href="css/global.css"><link rel="stylesheet" href="css/mizona-master-shell.css"><link rel="stylesheet" href="css/mizona-sidebar-uniforme.css"><link rel="stylesheet" href="css/mizona-stability.css"><link rel="stylesheet" href="css/integral-modules.css"></head>
<body class="auth-pending"><main class="page-shell"><div class="mz-integral-page"><header class="mz-integral-head"><div><h1>Verificar celular</h1><p>Necesario para alertas, chat privado y solicitudes de proveedor.</p></div></header>
<section class="mz-panel" style="max-width:620px"><div id="phoneStatus" class="mz-alert-box">Cargando tu cuenta…</div><form id="phoneForm" style="margin-top:16px"><div class="mz-field"><label>Número de celular</label><input id="phone" type="tel" inputmode="tel" autocomplete="tel" placeholder="+51 999 999 999" required><small>Usa el código de país. En Perú: +51.</small></div><div class="mz-actions"><button class="mz-btn primary" id="sendCode" type="submit">Enviar código</button></div></form>
<form id="codeForm" hidden style="margin-top:20px"><div class="mz-field"><label>Código recibido por SMS</label><input class="mz-phone-code" id="code" inputmode="numeric" autocomplete="one-time-code" maxlength="8" required></div><div class="mz-actions"><button class="mz-btn success" type="submit">Verificar ahora</button><button class="mz-btn secondary" id="resend" type="button">Reenviar código</button></div></form></section></div></main>
<script type="module" src="js/phone-verification.js"></script><script type="module" src="js/mizona-core.js"></script><script type="module" src="js/mizona-master-shell.js"></script><script type="module" src="js/mizona-sidebar-uniforme.js"></script></body></html>

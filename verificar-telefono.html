<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Celular opcional · MiZona</title>
<link rel="manifest" href="manifest.json"><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css"><link rel="stylesheet" href="css/global.css"><link rel="stylesheet" href="css/mizona-master-shell.css"><link rel="stylesheet" href="css/mizona-sidebar-uniforme.css"><link rel="stylesheet" href="css/mizona-stability.css"><link rel="stylesheet" href="css/integral-modules.css">
<style>.mz-phone-peru{display:flex;align-items:stretch;border:2px solid #1f2937;border-radius:16px;overflow:hidden;background:#fff;min-height:58px}.mz-phone-prefix{display:flex;align-items:center;justify-content:center;padding:0 16px;background:#eef4fb;border-right:1px solid #cbd5e1;color:#0f3f78;font-weight:900;font-size:18px}.mz-phone-peru input{border:0!important;border-radius:0!important;box-shadow:none!important;min-width:0;font-size:19px;letter-spacing:.04em;padding:0 16px!important;background:#fff!important;color:#111827!important}.mz-phone-help{display:flex;align-items:flex-start;gap:8px;margin-top:8px;color:#64748b;font-size:13px;line-height:1.45}</style></head>
<body class="auth-pending"><main class="page-shell"><div class="mz-integral-page"><header class="mz-integral-head"><div><h1>Celular opcional</h1><p>Tu cuenta se verifica mediante correo. OneSignal funciona sin verificar el celular.</p></div></header>
<section class="mz-panel" style="max-width:620px"><div id="phoneStatus" class="mz-alert-box">Cargando tu cuenta…</div><form id="phoneForm" style="margin-top:16px" novalidate><div class="mz-field"><label for="phone">Número de celular peruano (opcional)</label><div class="mz-phone-peru"><span class="mz-phone-prefix">+51</span><input id="phone" type="tel" inputmode="numeric" autocomplete="tel-national" placeholder="999 999 999" maxlength="9" pattern="9[0-9]{8}"></div><small class="mz-phone-help"><i class="ti ti-lock"></i><span>Será privado. Se usará solo como dato de contacto cuando tú lo autorices. No enviaremos códigos SMS.</span></small></div><div class="mz-actions"><button class="mz-btn primary" type="submit"><i class="ti ti-device-floppy"></i> Guardar celular</button><button class="mz-btn secondary" id="removePhone" type="button"><i class="ti ti-trash"></i> Eliminar</button><a class="mz-btn secondary" id="backLink" href="perfil.html">Volver</a></div></form></section></div></main>
<script type="module" src="js/phone-verification.js?v=6.0"></script><script type="module" src="js/mizona-core.js"></script><script type="module" src="js/mizona-master-shell.js"></script><script type="module" src="js/mizona-sidebar-uniforme.js"></script></body></html>

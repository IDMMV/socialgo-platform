<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Recuperar contraseña</title><link rel="stylesheet" href="css/global.css"><link rel="stylesheet" href="css/mizona-unified.css">
</head><body class="auth-page"><main class="auth-card"><h1>Recuperar contraseña</h1><div id="msg" class="notice" hidden></div><form id="form"><label>Correo<input id="email" type="email" required></label><button class="primary wide">Enviar enlace</button></form><p><a href="login.html">Volver</a></p></main><script type="module">import{requestPasswordReset}from'./js/auth.js';form.onsubmit=async e=>{e.preventDefault();try{await requestPasswordReset(email.value);msg.hidden=false;msg.textContent='Si la cuenta existe, recibirás un correo.';form.reset()}catch(x){msg.hidden=false;msg.textContent=x.message}};</script><script type="module" src="./js/mizona-core.js"></script>
</body></html>

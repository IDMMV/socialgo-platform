<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Iniciar sesión · MiZona.pe</title><link rel="stylesheet" href="css/global.css"><link rel="stylesheet" href="css/mizona-unified.css">
</head><body class="auth-page"><main class="auth-card"><a class="brand" href="index.html"><span class="brand-mark">MZ</span><span>MiZona.pe</span></a><h1>Iniciar sesión</h1><div id="msg" class="notice" hidden></div><form id="form"><label>Correo<input id="email" type="email" required autocomplete="email"></label><label>Contraseña<input id="password" type="password" minlength="8" required autocomplete="current-password"></label><button class="primary wide">Ingresar</button></form><p><a href="recuperar.html">¿Olvidaste tu contraseña?</a></p><p>¿No tienes cuenta? <a href="registro.html">Regístrate</a></p></main><script type="module">import{loginUser}from'./js/auth.js';import{getCurrentUser}from'./js/supabase.js';if(await getCurrentUser())location.href='index.html';form.onsubmit=async e=>{e.preventDefault();try{await loginUser(email.value,password.value);const n=new URLSearchParams(location.search).get('next');location.href=n&&!n.includes('://')?n:'index.html'}catch(x){msg.hidden=false;msg.textContent=x.message;msg.style.borderColor='var(--danger)'}};</script><script type="module" src="./js/mizona-core.js"></script>
</body></html>

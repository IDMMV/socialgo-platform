<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Iniciar sesión · SocialGo</title>
  <link rel="stylesheet" href="css/global.css">
</head>
<body class="auth-page">
  <main class="auth-card">
    <a class="brand" href="index.html"><span class="brand-mark">S</span><span data-brand-name>SocialGo</span></a>
    <h1>Iniciar sesión</h1>
    <p class="notice">Modo demostración. En la siguiente fase conectaremos autenticación real y segura con Supabase.</p>
    <form id="loginForm">
      <label>Correo electrónico<input id="email" type="email" autocomplete="email" required></label>
      <label>Contraseña<input id="password" type="password" autocomplete="current-password" minlength="8" required></label>
      <button class="primary wide" type="submit">Ingresar</button>
    </form>
    <p>¿No tienes cuenta? <a href="registro.html">Regístrate</a></p>
  </main>
  <script type="module">
    import { applyBrand } from "./js/brand.js";
    import { demoLogin } from "./js/auth.js";
    applyBrand();
    document.querySelector("#loginForm").addEventListener("submit", (event) => {
      event.preventDefault();
      demoLogin(document.querySelector("#email").value);
      location.href = "index.html";
    });
  </script>
</body>
</html>

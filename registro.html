<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Crear cuenta · MiZona.pe</title><link rel="stylesheet" href="css/global.css"><link rel="stylesheet" href="css/mizona-unified.css">
<link rel="stylesheet" href="css/mizona-phase2.css">
</head><body class="auth-page"><main class="auth-card"><a class="brand" href="index.html"><span class="brand-mark">MZ</span><span>MiZona.pe</span></a><h1>Crear cuenta</h1><div id="msg" class="notice" hidden></div><form id="form"><label>Nombre completo<input id="fullName" required maxlength="80"></label><label>Nombre de usuario<input id="username" required minlength="3" maxlength="24" pattern="[a-zA-Z0-9_.]+"><small id="help">Letras, números, punto o guion bajo.</small></label><label>Correo<input id="email" type="email" required></label><label>Tipo de cuenta<select id="accountType"><option value="personal">Personal</option><option value="creator">Creador</option><option value="business">Negocio</option></select></label><label>Contraseña<input id="password" type="password" minlength="8" required></label><label>Repetir contraseña<input id="password2" type="password" minlength="8" required></label><label class="toggle-row"><span>Acepto los términos</span><input type="checkbox" required></label><button class="primary wide">Crear cuenta</button></form><p>¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a></p></main><script type="module">import{registerUser,usernameAvailable}from'./js/auth.js';let t;username.oninput=()=>{clearTimeout(t);t=setTimeout(async()=>{try{help.textContent=await usernameAvailable(username.value)?'✓ Disponible':'No disponible'}catch{help.textContent='No se pudo comprobar'}},400)};form.onsubmit=async e=>{e.preventDefault();if(password.value!==password2.value){msg.hidden=false;msg.textContent='Las contraseñas no coinciden.';return}try{const d=await registerUser({fullName:fullName.value,username:username.value,email:email.value,password:password.value,accountType:accountType.value});msg.hidden=false;msg.textContent=d.session?'Cuenta creada.':'Cuenta creada. Revisa tu correo para confirmarla.';if(d.session)setTimeout(()=>location.href='perfil.html',800);else form.reset()}catch(x){msg.hidden=false;msg.textContent=x.message;msg.style.borderColor='var(--danger)'}};</script><script type="module" src="./js/mizona-core.js"></script>
</body></html>

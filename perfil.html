<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Mi perfil · SocialGo</title>
  <link rel="stylesheet" href="css/global.css">
</head>
<body>
  <main class="compact-page">
    <header style="display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:18px">
      <a class="brand" href="index.html" style="margin:0">
        <span class="brand-mark">S</span>
        <span data-brand-name>SocialGo</span>
      </a>
      <a class="secondary" href="index.html">← Volver</a>
    </header>

    <section class="page-card profile-edit-card">
      <div class="profile-media-block">
        <div class="profile-cover">
          <img id="coverImage" alt="" hidden>
          <button id="changeCover" class="cover-action" type="button">
            🖼️ Cambiar portada
          </button>
        </div>

        <div class="profile-avatar-row">
          <div id="avatarBox" class="profile-avatar-large">U</div>

          <div class="profile-avatar-controls">
            <button id="changeAvatar" class="primary avatar-upload-button" type="button">
              📷 Cambiar foto de perfil
            </button>
            <small>
              Esta imagen aparecerá en las burbujas, historias, publicaciones y clips.
            </small>
          </div>
        </div>

        <input id="avatarInput" type="file" accept="image/jpeg,image/png,image/webp" hidden>
        <input id="coverInput" type="file" accept="image/jpeg,image/png,image/webp" hidden>
      </div>

      <h1>Mi perfil</h1>

      <div id="loading" class="notice">Cargando perfil…</div>
      <div id="message" class="notice" hidden></div>

      <form id="profileForm" hidden>
        <div class="profile-form-grid">
          <label class="field">
            Nombre visible
            <input id="displayName" maxlength="80" required>
          </label>

          <label class="field">
            Usuario
            <input id="username" readonly>
            <small>Tu usuario es único.</small>
          </label>

          <label class="field">
            Correo de acceso
            <input id="email" type="email" required>
          </label>

          <label class="field">
            Número de contacto
            <input id="phone" type="tel" inputmode="tel" maxlength="25" placeholder="+51 999 999 999">
          </label>

          <label class="field full">
            Biografía
            <textarea id="bio" maxlength="300" rows="4" placeholder="Cuéntanos algo sobre ti"></textarea>
          </label>
        </div>

        <div class="profile-privacy">
          <label class="toggle-row">
            <span>Permitir que me encuentren por correo</span>
            <input id="findByEmail" type="checkbox">
          </label>
          <label class="toggle-row">
            <span>Permitir que me encuentren por teléfono</span>
            <input id="findByPhone" type="checkbox">
          </label>
        </div>

        <div class="profile-actions">
          <button class="primary" id="saveButton" type="submit">Guardar cambios</button>
          <a class="secondary" href="index.html">Cancelar y volver</a>
          <button class="secondary" id="logoutButton" type="button">Cerrar sesión</button>
        </div>
      </form>
    </section>

    <section class="page-card" style="margin-top:18px">
      <h2>Tu actividad</h2>
      <div class="profile-tabs">
        <button class="active" data-tab="posts">Publicaciones</button>
        <button data-tab="likes">Me gusta</button>
        <button data-tab="saved">Guardados</button>
        <button data-tab="shared">Compartidos</button>
      </div>
      <div id="activityContent" class="activity-grid">
        <p class="notice">Cargando actividad…</p>
      </div>
    </section>
  </main>

  <script type="module">
    import { applyBrand } from "./js/brand.js";
    import { supabase, getMyProfile, getCurrentUser } from "./js/supabase.js";
    import { uploadUserImage, removeStorageObject } from "./js/media.js";

    applyBrand();

    const fields = {
      loading: document.querySelector("#loading"),
      message: document.querySelector("#message"),
      form: document.querySelector("#profileForm"),
      save: document.querySelector("#saveButton"),
      displayName: document.querySelector("#displayName"),
      username: document.querySelector("#username"),
      email: document.querySelector("#email"),
      phone: document.querySelector("#phone"),
      bio: document.querySelector("#bio"),
      findByEmail: document.querySelector("#findByEmail"),
      findByPhone: document.querySelector("#findByPhone"),
      avatarBox: document.querySelector("#avatarBox"),
      coverImage: document.querySelector("#coverImage"),
      activity: document.querySelector("#activityContent")
    };

    let currentProfile = null;
    const user = await getCurrentUser();

    if (!user) {
      window.location.replace("login.html?next=perfil.html");
    } else {
      await loadProfile();
      await loadActivity("posts");
    }

    function showMessage(text, isError = false) {
      fields.message.hidden = false;
      fields.message.textContent = text;
      fields.message.style.borderColor = isError ? "var(--danger)" : "#22c55e";

      document.querySelector("#profileToast")?.remove();
      const toast = document.createElement("div");
      toast.id = "profileToast";
      toast.className = `toast ${isError ? "error" : "success"}`;
      toast.textContent = text;
      document.body.appendChild(toast);
      window.setTimeout(() => toast.remove(), 3500);
    }

    function initials(value) {
      return String(value || "U").split(/\s+/).slice(0,2).map(p => p[0]).join("").toUpperCase();
    }

    async function loadProfile() {
      currentProfile = await getMyProfile();

      if (!currentProfile) {
        fields.loading.textContent = "No se pudo cargar el perfil.";
        return;
      }

      fields.displayName.value = currentProfile.nombre_visible || "";
      fields.username.value = currentProfile.username || "";
      fields.email.value = user.email || "";
      fields.phone.value = currentProfile.telefono_contacto || "";
      fields.bio.value = currentProfile.biografia || "";
      fields.findByEmail.checked = Boolean(currentProfile.permitir_busqueda_correo);
      fields.findByPhone.checked = Boolean(currentProfile.permitir_busqueda_telefono);

      if (currentProfile.avatar_url) {
        fields.avatarBox.innerHTML = `<img src="${currentProfile.avatar_url}?v=${Date.now()}" alt="Foto de perfil">`;
      } else {
        fields.avatarBox.textContent = initials(currentProfile.nombre_visible);
      }

      if (currentProfile.portada_url) {
        fields.coverImage.src = `${currentProfile.portada_url}?v=${Date.now()}`;
        fields.coverImage.hidden = false;
      }

      fields.loading.hidden = true;
      fields.form.hidden = false;
    }

    async function updateProfileImage(kind, file) {
      if (!file) return;

      const isAvatar = kind === "avatar";
      const bucket = isAvatar ? "avatares" : "portadas";
      const oldUrl = isAvatar ? currentProfile.avatar_url : currentProfile.portada_url;

      try {
        showMessage("Procesando imagen…");

        const upload = await uploadUserImage({
          file,
          bucket,
          folder: isAvatar ? "perfil" : "portada",
          maxWidth: isAvatar ? 600 : 1800,
          maxHeight: isAvatar ? 600 : 700,
          quality: 0.84
        });

        const column = isAvatar ? "avatar_url" : "portada_url";
        const { error } = await supabase.from("perfiles").update({
          [column]: upload.url
        }).eq("id", user.id);

        if (error) throw error;

        await removeStorageObject(bucket, oldUrl).catch(console.error);
        currentProfile[column] = upload.url;
        await loadProfile();
        showMessage(isAvatar ? "Foto de perfil actualizada." : "Portada actualizada.");
      } catch (error) {
        showMessage(error.message, true);
      }
    }

    document.querySelector("#changeAvatar").addEventListener("click", () => avatarInput.click());
    document.querySelector("#changeCover").addEventListener("click", () => coverInput.click());
    avatarInput.addEventListener("change", () => updateProfileImage("avatar", avatarInput.files?.[0]));
    coverInput.addEventListener("change", () => updateProfileImage("cover", coverInput.files?.[0]));

    fields.form.addEventListener("submit", async (event) => {
      event.preventDefault();
      fields.save.disabled = true;

      try {
        const newEmail = fields.email.value.trim().toLowerCase();
        const oldEmail = String(user.email || "").toLowerCase();

        if (newEmail !== oldEmail) {
          const { error } = await supabase.auth.updateUser({ email: newEmail });
          if (error) throw error;
        }

        const { error } = await supabase.from("perfiles").update({
          nombre_visible: fields.displayName.value.trim(),
          telefono_contacto: fields.phone.value.trim() || null,
          biografia: fields.bio.value.trim() || null,
          permitir_busqueda_correo: fields.findByEmail.checked,
          permitir_busqueda_telefono: fields.findByPhone.checked
        }).eq("id", user.id);

        if (error) throw error;
        showMessage(newEmail !== oldEmail
          ? "Perfil guardado. Confirma el nuevo correo."
          : "Perfil actualizado correctamente.");
      } catch (error) {
        showMessage(error.message, true);
      } finally {
        fields.save.disabled = false;
      }
    });

    document.querySelector("#logoutButton").addEventListener("click", async () => {
      await supabase.auth.signOut({ scope: "local" });
      window.location.replace("login.html?logout=1");
    });

    document.querySelectorAll("[data-tab]").forEach(button => {
      button.addEventListener("click", async () => {
        document.querySelectorAll("[data-tab]").forEach(b => b.classList.remove("active"));
        button.classList.add("active");
        await loadActivity(button.dataset.tab);
      });
    });

    async function loadActivity(tab) {
      fields.activity.innerHTML = `<p class="notice">Cargando…</p>`;
      let query;

      if (tab === "posts") {
        query = supabase.from("publicaciones").select("id,contenido,archivo_url,creado_en").eq("autor_id", user.id).order("creado_en", {ascending:false});
      } else if (tab === "likes") {
        query = supabase.from("me_gusta_publicaciones").select("creado_en,publicaciones(id,contenido,archivo_url,creado_en)").eq("usuario_id", user.id).order("creado_en", {ascending:false});
      } else if (tab === "saved") {
        query = supabase.from("publicaciones_guardadas").select("creado_en,publicaciones(id,contenido,archivo_url,creado_en)").eq("usuario_id", user.id).order("creado_en", {ascending:false});
      } else {
        query = supabase.from("publicaciones_compartidas").select("creado_en,publicaciones(id,contenido,archivo_url,creado_en)").eq("usuario_id", user.id).order("creado_en", {ascending:false});
      }

      const { data, error } = await query;
      if (error) {
        fields.activity.innerHTML = `<p class="notice">${error.message}</p>`;
        return;
      }

      const posts = tab === "posts" ? data : data.map(item => item.publicaciones).filter(Boolean);

      fields.activity.innerHTML = posts.length
        ? posts.map(post => `
          <article class="mini-post">
            <small>${new Date(post.creado_en).toLocaleString("es-PE")}</small>
            ${post.contenido ? `<p>${escapeHtml(post.contenido)}</p>` : ""}
            ${post.archivo_url ? `<img class="post-image" src="${post.archivo_url}" alt="">` : ""}
          </article>`).join("")
        : `<p class="notice">No hay contenido en esta sección.</p>`;
    }

    function escapeHtml(value) {
      return String(value || "")
        .replaceAll("&","&amp;").replaceAll("<","&lt;")
        .replaceAll(">","&gt;").replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8"/><meta content="width=device-width,initial-scale=1" name="viewport"/><title>Nueva contraseña</title><link href="css/global.css" rel="stylesheet"/><link href="css/mizona-unified.css" rel="stylesheet"/>
<link href="css/mizona-phase2.css" rel="stylesheet"/>
<link href="assets/favicon-32.png" rel="icon" type="image/png"/><link href="assets/apple-touch-icon.png" rel="apple-touch-icon"/><link href="css/mizona-logo.css" rel="stylesheet"/></head><body class="auth-page"><main class="auth-card"><h1>Nueva contraseña</h1><div class="notice" hidden="" id="msg"></div><form id="form"><label>Nueva contraseña<input id="password" minlength="8" required="" type="password"/></label><label>Repetir contraseña<input id="password2" minlength="8" required="" type="password"/></label><button class="primary wide">Guardar</button></form></main><script type="module">import{updatePassword}from'./js/auth.js';form.onsubmit=async e=>{e.preventDefault();if(password.value!==password2.value){msg.hidden=false;msg.textContent='Las contraseñas no coinciden.';return}try{await updatePassword(password.value);msg.hidden=false;msg.textContent='Contraseña actualizada.';setTimeout(()=>location.href='index.html',900)}catch(x){msg.hidden=false;msg.textContent=x.message}};</script><script src="./js/mizona-core.js" type="module"></script>
</body></html>

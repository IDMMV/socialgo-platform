<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css"><title>Ofrecer servicios · MiZona</title>
<link rel="stylesheet" href="css/global.css"><link rel="stylesheet" href="css/mizona-master-shell.css"><link rel="stylesheet" href="css/mizona-sidebar-uniforme.css"><link rel="stylesheet" href="css/mizona-stability.css"><link rel="stylesheet" href="css/integral-modules.css"></head>
<body class="auth-pending"><main class="page-shell"><div class="mz-integral-page"><header class="mz-integral-head"><div><h1>Ofrecer servicios o productos</h1><p>Envía tu solicitud. El administrador revisará los datos antes de habilitar publicaciones.</p></div><a class="mz-btn secondary" href="servicios.html">Ver servicios</a></header><div id="providerState" class="mz-alert-box">Consultando tu estado…</div>
<form class="mz-panel" id="providerForm" style="margin-top:16px"><div class="mz-grid-2"><div class="mz-field"><label>Tipo</label><select id="providerType"><option value="independiente">Profesional independiente</option><option value="negocio">Negocio</option><option value="organizacion">Organización</option></select></div><div class="mz-field"><label>Nombre comercial o profesional</label><input id="providerName" required></div><div class="mz-field"><label>Categoría</label><input id="providerCategory" placeholder="Electricidad, gasfitería, clases…" required></div><div class="mz-field"><label>Distrito</label><input id="providerDistrict" required></div><div class="mz-field"><label>Zona de atención</label><input id="providerZone"></div><div class="mz-field"><label>WhatsApp</label><input id="providerWhatsapp" type="tel"></div><div class="mz-field"><label>RUC (opcional al inicio)</label><input id="providerRuc" inputmode="numeric"></div><div class="mz-field"><label>Mensaje al administrador</label><input id="providerMessage"></div><div class="mz-field" style="grid-column:1/-1"><label>Descripción y experiencia</label><textarea id="providerDescription" minlength="20" required></textarea></div></div><div class="mz-actions"><button class="mz-btn primary">Enviar para revisión</button><a class="mz-btn secondary" href="perfil.html">Revisar mi perfil</a></div></form></div></main>
<script type="module" src="js/proveedor.js"></script><script type="module" src="js/mizona-core.js"></script><script type="module" src="js/mizona-master-shell.js"></script><script type="module" src="js/mizona-sidebar-uniforme.js"></script></body></html>

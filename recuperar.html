<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8"/><meta content="width=device-width,initial-scale=1" name="viewport"/><title>Recuperar contraseña</title><link href="css/global.css" rel="stylesheet"/><link href="css/mizona-unified.css" rel="stylesheet"/>
<link href="css/mizona-phase2.css" rel="stylesheet"/>
<link href="assets/favicon-32.png" rel="icon" type="image/png"/><link href="assets/apple-touch-icon.png" rel="apple-touch-icon"/><link href="css/mizona-logo.css" rel="stylesheet"/></head><body class="auth-page"><main class="auth-card"><h1>Recuperar contraseña</h1><div class="notice" hidden="" id="msg"></div><form id="form"><label>Correo<input id="email" required="" type="email"/></label><button class="primary wide">Enviar enlace</button></form><p><a href="login.html">Volver</a></p></main><script type="module">import{requestPasswordReset}from'./js/auth.js';form.onsubmit=async e=>{e.preventDefault();try{await requestPasswordReset(email.value);msg.hidden=false;msg.textContent='Si la cuenta existe, recibirás un correo.';form.reset()}catch(x){msg.hidden=false;msg.textContent=x.message}};</script><script src="./js/mizona-core.js" type="module"></script>
</body></html>
